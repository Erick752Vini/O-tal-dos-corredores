<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDF00"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
  </defs>
  
  <!-- Trophy base -->
  <rect x="30" y="85" width="40" height="8" rx="2" fill="#333"/>
  <rect x="35" y="75" width="30" height="12" rx="2" fill="#444"/>
  
  <!-- Trophy cup -->
  <path d="M20 35 Q20 15 50 15 Q80 15 80 35 L75 60 Q72 70 50 70 Q28 70 25 60 Z" 
        fill="url(#trophyGrad)" stroke="#FFB300" stroke-width="2"/>
  
  <!-- Handles -->
  <path d="M20 30 Q5 30 5 45 Q5 55 22 50" fill="none" stroke="#FFC107" stroke-width="4" stroke-linecap="round"/>
  <path d="M80 30 Q95 30 95 45 Q95 55 78 50" fill="none" stroke="#FFC107" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Shine -->
  <path d="M30 25 Q35 20 40 25" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  
  <!-- Star on trophy -->
  <text x="50" y="50" text-anchor="middle" font-size="20" fill="#fff">★</text>
</svg>
