<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDF00"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#logoGrad)" stroke-width="3"/>
  
  <!-- S letter -->
  <text x="50" y="65" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="50" fill="url(#logoGrad)" font-weight="bold">S</text>
  
  <!-- Racing stripe -->
  <rect x="20" y="35" width="60" height="4" fill="#009C3B" rx="2"/>
</svg>
